<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Трекер задач{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Трекер задач</h1>
            <nav>
                <a href="{{ url_for('index') }}">📋 Задачи</a>
                <a href="{{ url_for('statistics') }}">📊 Статистика</a>
            </nav>
        </header>
        
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>Версия 2.0.0 | Сделано с ❤️</p>
        </footer>
    </div>
</body>
</html>
